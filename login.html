<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login | CAA</title>

    <link
        rel="stylesheet"
        href="login.css"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@300..900&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <main class="login-container">

        <h1>CAA abierta</h1>

        <p>
            Ingresa tu usuario
        </p>

        <input
            type="text"
            id="username"
            placeholder="Usuario"
        >

        <input
            type="password"
            id="pin"
            placeholder="PIN"
            maxlength="4"
        >

        <button onclick="login()">
            Entrar
        </button>

        <button
            class="secondary-btn"
            onclick="openModal()"
        >
            Crear usuario
        </button>

    </main>

    <!-- MODAL -->

    <div
        class="modal hidden"
        id="modal"
    >

        <div class="modal-content">

            <h2>Nuevo usuario</h2>

            <input
                type="text"
                id="newUsername"
                placeholder="Usuario"
            >

            <input
                type="password"
                id="newPin"
                placeholder="PIN"
                maxlength="4"
            >

            <button onclick="createUser()">
                Guardar
            </button>

            <button onclick="closeModal()">
                Cancelar
            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="login.js"></script>

</body>
</html>
